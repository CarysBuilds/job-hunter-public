name: build

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  release:
    types: [created]

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:ci
      - run: npm run build
      - run: npm run scan:sensitive
      - run: npm run package:windows
      - run: npm run scan:sensitive -- --include-build
      - name: Read package version
        id: package-version
        shell: pwsh
        run: |
          $version = (Get-Content package.json | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT
      - name: Build installer
        uses: Minionguyjpro/Inno-Setup-Action@7547f78e92afc13352b946775483c5392b7fda10 # v1.2.5
        env:
          JOB_HUNTER_VERSION: ${{ steps.package-version.outputs.version }}
          JOB_HUNTER_STAGE: ${{ github.workspace }}\staging\windows
          JOB_HUNTER_OUTPUT: ${{ github.workspace }}\artifacts\windows
        with:
          path: packaging/windows/JobHunter.iss
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: JobHunter-Setup-x64
          path: artifacts/windows/JobHunter-Setup-x64.exe

  release:
    if: github.event_name == 'release'
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: JobHunter-Setup-x64
          path: artifacts/windows
      - name: Upload release asset
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: artifacts/windows/JobHunter-Setup-x64.exe
